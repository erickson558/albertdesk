name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build executable
        run: python build.py
      
      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AlbertDesk v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## AlbertDesk v${{ steps.get_version.outputs.VERSION }}
            
            ### 📥 Instalación
            1. Descarga `AlbertDesk.exe`
            2. Ejecuta el archivo (no requiere instalación)
            
            ### 🚀 Características
            - Control remoto de escritorio en tiempo real
            - Conexión LAN P2P
            - Cloudflare Tunnel para conectividad por internet
            - Transferencia de archivos bidireccional
            - Modo pantalla completa
            - Terminal CLI embebida para instalación de Cloudflare
            
            ### 📝 Changelog
            Ver [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
            
            ### 🔧 Requisitos
            - Windows 10/11
            - Para conexiones LAN: estar en la misma red
            - Para internet: instalar Cloudflare Tunnel (gratuito)
            
            ---
            **Versión completa:** v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            AlbertDesk.exe
            README.md
            CHANGELOG.md
            LICENSE
